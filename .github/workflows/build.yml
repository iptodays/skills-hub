name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ──────────────────────────── macOS ────────────────────────────
  build-macos:
    name: macOS (dmg + app)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: 缓存 Rust 构建
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用（Universal Binary）
        run: npm run tauri build -- --bundles dmg,app --target universal-apple-darwin

      - name: 压缩 .app 为 zip（Release 附件需为单文件）
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle/macos
          zip -r "Skills Hub.app.zip" "Skills Hub.app"

      - name: 上传 macOS 产物
        uses: actions/upload-artifact@v4
        with:
          name: skills-hub-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.zip

  # ──────────────────────────── Windows ────────────────────────────
  build-windows:
    name: Windows (nsis + msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用（仅 nsis 安装包，跳过 icns）
        run: npm run tauri build -- --bundles nsis

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: skills-hub-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  # ──────────────────────────── Release ────────────────────────────
  release:
    name: 发布 GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 列出产物（调试用）
        run: find artifacts -type f

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Skills Hub ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.msi
