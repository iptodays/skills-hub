<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1f2142"/>
      <stop offset="100%" stop-color="#141526"/>
    </linearGradient>
    <!-- 闪电渐变 -->
    <linearGradient id="boltGrad" x1="600" y1="180" x2="430" y2="840" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffd060"/>
      <stop offset="60%" stop-color="#e8920a"/>
      <stop offset="100%" stop-color="#c97010"/>
    </linearGradient>
    <!-- 光晕效果 -->
    <radialGradient id="glowGrad" cx="512" cy="500" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8920a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e8920a" stop-opacity="0"/>
    </radialGradient>
    <!-- 投影 -->
    <filter id="boltShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#ffa020" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- 整体缩放至 82%，留出 ~9% 透明边距（macOS Dock 图标规范） -->
  <g transform="translate(92,92) scale(0.82)">

  <!-- 圆角矩形背景 -->
  <rect width="1024" height="1024" rx="196" fill="url(#bgGrad)"/>

  <!-- 六边形装饰圈（最外层，低透明度） -->
  <polygon points="512,108 856,307 856,703 512,903 168,703 168,307"
    fill="none" stroke="#c97f20" stroke-width="20" opacity="0.12"/>

  <!-- 中层六边形装饰 -->
  <polygon points="512,200 792,357 792,671 512,828 232,671 232,357"
    fill="none" stroke="#c97f20" stroke-width="14" opacity="0.10"/>

  <!-- 背景光晕 -->
  <circle cx="512" cy="490" r="280" fill="url(#glowGrad)"/>

  <!-- 主体：闪电符号 -->
  <path
    d="M 590 178
       L 350 548
       L 498 548
       L 432 846
       L 706 466
       L 554 466
       Z"
    fill="url(#boltGrad)"
    filter="url(#boltShadow)"
  />

  <!-- 闪电高光叠层 -->
  <path
    d="M 590 178
       L 350 548
       L 498 548
       L 432 846
       L 706 466
       L 554 466
       Z"
    fill="url(#boltHighlight)"
    opacity="0.35"
  />

  </g>
  <defs>
    <linearGradient id="boltHighlight" x1="590" y1="178" x2="560" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
